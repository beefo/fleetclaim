steps:
  # Build all images in parallel using waitFor
  
  # Build Worker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-worker'
    args:
      - 'build'
      - '--cache-from'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/fleetclaim/worker:latest'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/fleetclaim/worker:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/fleetclaim/worker:latest'
      - '-f'
      - 'src/FleetClaim.Worker/Dockerfile'
      - '.'
    waitFor: ['-']  # Start immediately

  # Build API image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-api'
    args:
      - 'build'
      - '--cache-from'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/fleetclaim/api:latest'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/fleetclaim/api:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/fleetclaim/api:latest'
      - '-f'
      - 'src/FleetClaim.Api/Dockerfile'
      - '.'
    waitFor: ['-']  # Start immediately

  # Build Add-In React image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-addin'
    args:
      - 'build'
      - '--cache-from'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/fleetclaim/addin-react:latest'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/fleetclaim/addin-react:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/fleetclaim/addin-react:latest'
      - 'src/FleetClaim.AddIn.React'
    waitFor: ['-']  # Start immediately

  # Build Admin image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-admin'
    args:
      - 'build'
      - '--cache-from'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/fleetclaim/admin:latest'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/fleetclaim/admin:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/fleetclaim/admin:latest'
      - '-f'
      - 'src/FleetClaim.Admin/Dockerfile'
      - '.'
    waitFor: ['-']  # Start immediately

  # Push all images (after their respective builds complete)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-worker'
    args: ['push', '--all-tags', 'us-central1-docker.pkg.dev/$PROJECT_ID/fleetclaim/worker']
    waitFor: ['build-worker']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-api'
    args: ['push', '--all-tags', 'us-central1-docker.pkg.dev/$PROJECT_ID/fleetclaim/api']
    waitFor: ['build-api']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-addin'
    args: ['push', '--all-tags', 'us-central1-docker.pkg.dev/$PROJECT_ID/fleetclaim/addin-react']
    waitFor: ['build-addin']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-admin'
    args: ['push', '--all-tags', 'us-central1-docker.pkg.dev/$PROJECT_ID/fleetclaim/admin']
    waitFor: ['build-admin']

  # Deploy Add-In React to Cloud Run (after push)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-addin'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'fleetclaim-addin-react'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/fleetclaim/addin-react:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'
      - '--platform'
      - 'managed'
    waitFor: ['push-addin']

  # Deploy API to Cloud Run (after push)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-api'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'fleetclaim-api'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/fleetclaim/api:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
    waitFor: ['push-api']

  # Update Worker Job (after push)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-worker'
    entrypoint: gcloud
    args:
      - 'run'
      - 'jobs'
      - 'update'
      - 'fleetclaim-worker'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/fleetclaim/worker:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
    waitFor: ['push-worker']

  # Deploy Admin to Cloud Run (after push)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-admin'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'fleetclaim-admin'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/fleetclaim/admin:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
    waitFor: ['push-admin']

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/fleetclaim/worker:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/fleetclaim/worker:latest'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/fleetclaim/api:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/fleetclaim/api:latest'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/fleetclaim/addin-react:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/fleetclaim/addin-react:latest'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/fleetclaim/admin:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/fleetclaim/admin:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'  # Faster build machine

timeout: '1200s'
