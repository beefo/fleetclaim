steps:
  # Build React Add-In image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/fleetclaim/addin-react:$BUILD_ID'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/fleetclaim/addin-react:latest'
      - 'src/FleetClaim.AddIn.React'

  # Push React Add-In image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/fleetclaim/addin-react'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'fleetclaim-addin-react'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/fleetclaim/addin-react:$BUILD_ID'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'
      - '--memory'
      - '256Mi'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/fleetclaim/addin-react:$BUILD_ID'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/fleetclaim/addin-react:latest'

options:
  logging: CLOUD_LOGGING_ONLY

timeout: '600s'
