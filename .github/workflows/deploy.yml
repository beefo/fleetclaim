name: Deploy to GCP

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'cloudbuild.yaml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  GCP_PROJECT_ID: fleetclaim
  GCP_REGION: us-central1
  WORKLOAD_IDENTITY_PROVIDER: projects/589116575765/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  SERVICE_ACCOUNT: github-deploy@fleetclaim.iam.gserviceaccount.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Build and Deploy with Cloud Build
        run: |
          gcloud builds submit \
            --config=cloudbuild.yaml \
            --substitutions=COMMIT_SHA=${{ github.sha }} \
            --project=${{ env.GCP_PROJECT_ID }}

      - name: Deployment Summary
        run: |
          echo "## 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Services deployed:**" >> $GITHUB_STEP_SUMMARY
          echo "- fleetclaim-api" >> $GITHUB_STEP_SUMMARY
          echo "- fleetclaim-addin-react" >> $GITHUB_STEP_SUMMARY
          echo "- fleetclaim-admin" >> $GITHUB_STEP_SUMMARY
          echo "- fleetclaim-worker (job)" >> $GITHUB_STEP_SUMMARY
