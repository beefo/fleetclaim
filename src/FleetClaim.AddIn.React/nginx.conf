server {
    listen 8080;
    server_name localhost;
    
    root /usr/share/nginx/html;
    index index.html;
    
    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    
    # CORS headers for all MyGeotab servers
    add_header Access-Control-Allow-Origin *;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
    add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept";
    
    # Hashed assets (contenthash in filename) - cache forever
    # These files have unique names when content changes, so aggressive caching is safe
    # Match files like fleetclaim.abc12345.js or fleetclaim.abc12345.css
    location ~* \.([a-f0-9]+)\.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin *;
    }
    
    # Static images - cache for a day
    location ~* \.(png|jpg|jpeg|gif|ico|svg)$ {
        expires 1d;
        add_header Cache-Control "public";
        add_header Access-Control-Allow-Origin *;
    }
    
    # Config.json should not be cached heavily
    location = /config.json {
        expires 5m;
        add_header Cache-Control "public, max-age=300";
        add_header Access-Control-Allow-Origin *;
    }
    
    # index.html should never be cached (it references the hashed assets)
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Access-Control-Allow-Origin *;
    }
    
    # SPA fallback - also no cache for root
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Access-Control-Allow-Origin *;
    }
}
